<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>後台管理系統 - 登入</title>
    <style>
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #bcdcb4; /* 與 index.html 完全一致的淡綠色大背景 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        /* ==================== 完美同步 index.html 規格的登入卡片 ==================== */
        .login-card {
            background-color: #ffffff; 
            border-radius: 60px;       /* 相同的超大圓角 */  
            width: 450px;              /* 完美同步 index.html 寬度 */
            height: 620px;             /* 完美同步 index.html 高度 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            padding: 40px;             /* 相同內邊距 */
            position: relative;
        }

        /* Logo 圖片樣式，完美與點餐首頁同步 */
        .login-logo {
            width: 80px;
            height: auto;
            margin-bottom: 25px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .title {
            font-size: 36px;
            color: #2b4c23; /* 深綠色文字 */
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px; /* 為副標留出微調空間 */
            text-align: center;
        }

        .subtitle {
            font-size: 16px;
            color: #7ba370;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 50px; /* 拉開與輸入框的整體比例 */
            text-transform: uppercase;
            text-align: center;
        }

        .login-form {
            display: flex;
            align-items: center;
            margin-bottom: 40px; /* 與 index.html 下方區塊間距對齊 */
            width: 100%;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        /* 包裹輸入框的容器 */
        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 260px; /* 完美對齊輸入框寬度 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-form input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #e0e0e0; /* 淡色下底線 */
            font-size: 24px; /* 調近 index.html 的 26px 視覺感 */
            width: 100%;
            text-align: center;
            outline: none;
            padding-bottom: 8px;
            color: #2b4c23;
            transition: border-color 0.2s;
            padding-left: 35px;
            padding-right: 35px;
        }

        /* 【核心修改】透過 CSS 安全屬性將文字遮蔽為圓點，直接繞過瀏覽器的原生眼睛機制 */
        .password-mask {
            -webkit-text-security: disc !important; /* Chrome, Safari, Edge 支援的遮罩 */
        }

        .login-form input:focus {
            border-bottom-color: #4e803c;
        }

        .login-form input.input-error {
            border-bottom-color: #a01010 !important;
        }

        .login-form input::placeholder {
            color: #d2d2d2;
            font-weight: normal;
        }

        /* 自訂鎖頭切換按鈕的絕對定位 */
        .toggle-password {
            position: absolute;
            right: 5px;
            bottom: 10px;
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            z-index: 15;
            display: inline-block;
            line-height: 1;
        }

        /* ==================== 完美同步 index.html 的粉綠色按鈕 ==================== */
        .login-btn {
            background-color: #a4d49d; /* 完全同步 index.html 的粉綠色 */
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            max-width: 200px; /* 寬度同步 index.html 的按鈕配比 */
            white-space: nowrap; 
        }

        .login-btn:hover:not(:disabled) { background-color: #93c48c; transform: scale(1.03); }
        .login-btn:active:not(:disabled) { transform: scale(0.98); }
        .login-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .login-admin-link {
            background: none;
            border: none;
            color: #7ba370;
            font-size: 16px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            text-decoration: none;
            text-align: center;
        }
        .login-admin-link:hover {
            color: #2b4c23;
            transform: scale(1.02);
        }

        .error-msg { 
            font-size: 16px; 
            margin-top: 15px; 
            min-height: 20px; 
            font-weight: bold; 
            text-align: center; 
            width: 100%;
            word-break: break-all; 
        }

        /* ==================== 手機版 RWD 適應 ==================== */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .login-card {
                width: 90%;
                height: auto;
                padding: 40px 20px;
                border-radius: 35px;
            }
            .title { font-size: 28px; }
            .subtitle { margin-bottom: 30px; font-size: 13px; letter-spacing: 3px; }
            .login-form { margin-bottom: 25px; }
            
            .input-wrapper { max-width: 85%; } 
            .login-form input { font-size: 20px; padding-left: 30px; padding-right: 30px; }
            
            .toggle-password { right: 4px; bottom: 8px; font-size: 18px; }
            
            .login-btn {
                font-size: 20px;
                max-width: 85%; 
            }
            .login-admin-link { font-size: 15px; margin-top: 20px; }
            .error-msg { font-size: 14px; }
        }

        @media (max-width: 340px) {
            .title { font-size: 24px; }
            .login-card { padding-top: 40px; border-radius: 30px; }
            .input-wrapper, .login-btn { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div id="login-section" class="login-card">
        <img src="logo.gif" alt="系統Logo" class="login-logo">
        
        <div class="title">後台管理系統</div>
        <div class="subtitle">MANAGEMENT</div>
        
        <form class="login-form" id="loginForm" onsubmit="executeAdminLogin(event)">
            <div class="input-wrapper">
                <input type="text" id="adminUser" placeholder="請輸入管理員帳號" autocomplete="username" autofocus required onclick="this.select()">
            </div>
            <div class="input-wrapper">
                <input type="text" id="adminPass" class="password-mask" placeholder="請輸入管理員密碼" autocomplete="current-password" required onclick="this.select()">
                <span class="toggle-password" id="eye-icon" onclick="togglePasswordVisibility()">🔐</span>
            </div>
            <button type="submit" class="login-btn" id="submit-login-btn">登入</button>
        </form>
        
        <button type="button" class="login-admin-link" onclick="navigateToHome()">🍀 返回訂餐系統 ➔</button>
        
        <div id="msg-display" class="error-msg"></div>
    </div>

    <script>
        let isSubmitting = false;

        function navigateToHome() {
            window.location.href = 'index.html'; 
        }

        /* 【核心修改】不切換 input 類型，而是透過開關遮罩 class 來切換密碼顯示與隱藏 */
        function togglePasswordVisibility() {
            const passInput = document.getElementById('adminPass');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passInput.classList.contains('password-mask')) {
                passInput.classList.remove('password-mask');
                eyeIcon.textContent = '🔒'; // 明文顯示時：閉合鎖
            } else {
                passInput.classList.add('password-mask');
                eyeIcon.textContent = '🔐'; // 隱藏密碼時：帶鑰匙鎖
            }
        }

        async function executeAdminLogin(event) {
            if (event) event.preventDefault();
            if (isSubmitting) return;

            const userInput = document.getElementById('adminUser');
            const passInput = document.getElementById('adminPass');
            const msgDisplay = document.getElementById('msg-display');
            const loginBtn = document.getElementById('submit-login-btn');

            userInput.classList.remove('input-error');
            passInput.classList.remove('input-error');

            const username = userInput.value.trim();
            const password = passInput.value.trim();

            if (!username || !password) {
                msgDisplay.style.color = '#a01010';
                msgDisplay.innerText = '❌ 請完整輸入帳號與密碼！';
                if(!username) userInput.classList.add('input-error');
                if(!password) passInput.classList.add('input-error');
                return;
            }

            isSubmitting = true;
            loginBtn.disabled = true;
            userInput.disabled = true;
            passInput.disabled = true;
            msgDisplay.style.color = '#556b52';
            msgDisplay.innerText = '⏳ 安全認證中，請稍候...';

            function resetInputs(focusOnPassword = true) {
                isSubmitting = false;
                loginBtn.disabled = false;
                userInput.disabled = false;
                passInput.disabled = false;
                if (focusOnPassword) {
                    passInput.value = '';
                    passInput.classList.add('password-mask'); // 重設為隱藏狀態
                    document.getElementById('eye-icon').textContent = '🔐';
                    passInput.focus();
                }
            }

            setTimeout(async () => {
                // 本地預設測試帳密
                if (username === '18445' && password === 'zxc456456') {
                    msgDisplay.style.color = '#1f8a62';
                    msgDisplay.innerText = '🎉 認證成功！正在進入管理後台...';
                    
                    resetInputs(false); 
                    
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 800);
                    return; 
                } 
                
                // API 驗證請求
                try {
                    const response = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }

                    const data = await response.json();

                    if (data.success) {
                        msgDisplay.style.color = '#1f8a62';
                        msgDisplay.innerText = '🎉 認證成功！正在進入管理後台...';
                        
                        resetInputs(false);
                        
                        setTimeout(() => {
                            window.location.href = 'admin-dashboard.html';
                        }, 800);
                        return; 
                    } else {
                        msgDisplay.style.color = '#a01010';
                        msgDisplay.innerText = '❌ ' + (data.message || '帳號或密碼錯誤！');
                        userInput.classList.add('input-error');
                        passInput.classList.add('input-error');
                    }
                } catch (error) {
                    msgDisplay.style.color = '#a01010';
                    msgDisplay.innerText = '❌ 帳號或密碼錯誤！（網路認證失敗）';
                    userInput.classList.add('input-error');
                    passInput.classList.add('input-error');
                }

                resetInputs(true);

            }, 600);
        }
    </script>
</body>
</html>
